name: Extension CI & Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Package extension
        run: npx vsce package --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: '*.vsix'
          if-no-files-found: error

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npx vsce package --allow-missing-repository

      - name: Resolve VSIX path
        id: vsix
        shell: bash
        run: |
          set -euo pipefail
          VSIX_PATH="$(ls -1 *.vsix | head -n 1)"
          echo "path=${VSIX_PATH}" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath "${{ steps.vsix.outputs.path }}" --pat "${VSCE_PAT}"

      - name: Publish to Open VSX (optional)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "OVSX_PAT is not set. Skipping Open VSX publish."
            exit 0
          fi
          npx ovsx publish "${{ steps.vsix.outputs.path }}" -p "${OVSX_PAT}"

      - name: Create GitHub release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true